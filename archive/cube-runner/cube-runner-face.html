<article class="cube-face cube-face--top">
  <div class="cube-face-surface cube-face-surface--snake" data-snake-game>
    <div class="cube-snake-card">
      <div class="cube-snake-head">
        <p class="cube-face-kicker" data-i18n="snake.kicker">MINI GAME</p>
        <p class="cube-snake-score">
          <span data-i18n="snake.scoreLabel">Score</span>
          <span data-snake-score>0</span>
        </p>
      </div>

      <div class="cube-snake-stage">
        <canvas class="cube-snake-canvas" data-snake-canvas data-cube-interactive width="256" height="256" tabindex="0" aria-label="Runner game" data-i18n-aria-label="snake.canvasAria"></canvas>
        <div class="cube-snake-status" data-snake-status>Ready</div>
      </div>

      <div class="cube-snake-meta">
        <h3 class="cube-face-title cube-snake-title" data-i18n="snake.title">Runner</h3>
        <p class="cube-face-copy cube-snake-copy" data-i18n="snake.helper">Tocca per saltare tra release, ostacoli e sistemi digitali.</p>
      </div>

      <div class="cube-snake-actions">
        <button type="button" class="cube-snake-button cube-snake-button--primary" data-snake-action data-cube-interactive>Start</button>
        <p class="cube-snake-tap-hint" data-i18n="snake.tapHint">Tap to jump</p>
      </div>
    </div>
  </div>
</article>
